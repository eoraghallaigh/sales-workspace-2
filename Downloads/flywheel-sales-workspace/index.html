    <!-- Critical CSS variables to prevent flash of wrong colors -->

    <style>
      :root {
        /* Base Trellis colors */
        --trellis-color-white: #ffffff;
        --trellis-color-black: #141414;
        --trellis-color-neutral-100: #f8f7f6;
        --trellis-color-neutral-200: #f5f3f2;

        --trellis-color-neutral-1000: #333333;
        --trellis-color-neutral-1600: #141414;
        --trellis-color-magenta-1400: #46062B;
        
        /* Alpha colors */
        --trellis-color-alphadark-100: rgba(20, 20, 20, 0.1);
        --trellis-color-alphadark-700: rgba(20, 20, 20, 0.7);
        --trellis-color-alphadark-800: rgba(20, 20, 20, 0.8);
        
        /* Surface fills - resolved values */
        --color-fill-surface-recessed: #f8f7f6;
        --color-fill-surface-recessedhover: rgba(20, 20, 20, 0.7);
        --color-fill-surface-recessedpressed: rgba(20, 20, 20, 0.8);

        --color-fill-surface-defaulthover: rgba(20, 20, 20, 0.7);
        --color-fill-surface-defaultpressed: rgba(20, 20, 20, 0.8);

        --color-fill-surface-overlay: #ffffff;
        
        /* Primary/Secondary/Tertiary fills */
        --color-fill-primary-default: #141414;
        --color-fill-primary-hover: #333333;
        --color-fill-primary-pressed: #4d4c4c;
        --color-fill-primary-disabled: #f5f3f2;
        --color-fill-secondary-default: #ffffff;
        --color-fill-secondary-hover: #f5f3f2;
        --color-fill-secondary-pressed: #e7e5e4;

        --color-fill-tertiary-default: #ffffff;

        --color-fill-tertiary-disabled: #ffffff;

        --color-fill-field-default-alt: #f8f7f6;
        
        /* Text colors */

        --color-text-core-disabled: #8c8787;
        --color-text-core-onfilldefault: #ffffff;
        --color-text-primary-default: #ffffff;
        --color-text-primary-disabled: #8c8787;
        --color-text-secondary-default: #141414;
        --color-text-secondary-disabled: #8c8787;
        --color-text-tertiary-default: #141414;
        --color-text-interactive-default: #46062B;
        
        /* Border colors */
        --color-border-core-default: #8c8787;
        --color-border-core-hover: #676565;
        --color-border-core-pressed: #141414;
        --color-border-core-subtle: #cfcccb;
        --color-border-core-disabled: #e7e5e4;
        --color-border-interactive-default: #8c8787;
